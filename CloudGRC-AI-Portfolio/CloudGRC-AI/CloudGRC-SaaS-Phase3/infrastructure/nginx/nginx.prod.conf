# ══════════════════════════════════════════════════════════
#  CloudGRC-AI — Nginx Production Config
#  SSL termination + reverse proxy + rate limiting + security headers
# ══════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # ── Rate limiting zones ──
    limit_req_zone  $binary_remote_addr zone=api_zone:10m   rate=30r/m;
    limit_req_zone  $binary_remote_addr zone=auth_zone:10m  rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

    # ── Upstream services ──
    upstream backend  { server backend:8000;  keepalive 32; }
    upstream frontend { server frontend:3000; keepalive 16; }
    upstream flower   { server flower:5555; }

    # ── HTTP → HTTPS redirect ──
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Main Server ──
    server {
        listen 443 ssl http2;
        server_name your-domain.com www.your-domain.com;

        # ── SSL ──
        ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # ── Security Headers ──
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://checkout.razorpay.com; connect-src 'self' https://api.razorpay.com; img-src 'self' data:; style-src 'self' 'unsafe-inline';" always;

        # ── Connection limit ──
        limit_conn conn_zone 20;

        # ── API Routes → FastAPI ──
        location /api/ {
            limit_req zone=api_zone burst=15 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_buffer_size  8k;
        }

        # ── Auth routes — stricter limiting ──
        location /api/v1/auth/ {
            limit_req zone=auth_zone burst=5 nodelay;
            proxy_pass        http://backend;
            proxy_set_header  Host $host;
            proxy_set_header  X-Real-IP $remote_addr;
            proxy_set_header  X-Forwarded-Proto https;
        }

        # ── Health check ──
        location /health {
            proxy_pass http://backend/health;
            access_log off;
        }

        # ── Flower (task monitor) — protected ──
        location /flower/ {
            proxy_pass       http://flower;
            proxy_set_header Host $host;
            rewrite          ^/flower/(.*)$ /$1 break;
        }

        # ── Next.js Frontend ──
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Static assets with caching ──
        location /_next/static/ {
            proxy_pass   http://frontend;
            add_header   Cache-Control "public, max-age=31536000, immutable";
            access_log   off;
        }

        # ── Block common attack paths ──
        location ~* \.(env|git|sql|bak|conf|log)$ { return 404; }
        location ~ /\.                             { deny all; }
    }
}
