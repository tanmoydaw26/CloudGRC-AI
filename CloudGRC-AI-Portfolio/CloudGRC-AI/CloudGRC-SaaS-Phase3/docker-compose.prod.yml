version: "3.9"

# ╔══════════════════════════════════════════════════════════════╗
# ║  CloudGRC-AI — Production Docker Compose                    ║
# ║  Services: PostgreSQL · Redis · Backend · Celery · Frontend · Nginx ║
# ╚══════════════════════════════════════════════════════════════╝

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ─────────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cloudgrc_postgres
    restart: always
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-cloudgrc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-cloudgrc_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cloudgrc}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  # ─────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cloudgrc_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ─────────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: cloudgrc_backend
    restart: always
    env_file: ./backend/.env
    environment:
      DATABASE_URL:     postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL:        redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL:  redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *default-logging

  # ─────────────────────────────────────────────
  # Celery Worker
  # ─────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: cloudgrc_celery
    restart: always
    env_file: ./backend/.env
    environment:
      DATABASE_URL:     postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL:        redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL:  redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
    command: celery -A backend.workers.celery_app worker --loglevel=info -Q scans,emails --concurrency=4 --max-tasks-per-child=100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 768M
    logging: *default-logging

  # ─────────────────────────────────────────────
  # Celery Beat (Scheduled Tasks)
  # ─────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: cloudgrc_beat
    restart: always
    env_file: ./backend/.env
    environment:
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CELERY_BROKER_URL:  redis://:${REDIS_PASSWORD}@redis:6379/0
    command: celery -A backend.workers.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    depends_on:
      - redis
      - postgres
    networks:
      - internal
    logging: *default-logging

  # ─────────────────────────────────────────────
  # Celery Flower (Task Monitor)
  # ─────────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: cloudgrc_flower
    restart: always
    env_file: ./backend/.env
    command: celery -A backend.workers.celery_app flower --port=5555 --basic-auth=${FLOWER_USER}:${FLOWER_PASSWORD}
    depends_on:
      - redis
    networks:
      - internal
      - public
    logging: *default-logging

  # ─────────────────────────────────────────────
  # Next.js Frontend
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_RAZORPAY_KEY_ID: ${NEXT_PUBLIC_RAZORPAY_KEY_ID}
    container_name: cloudgrc_frontend
    restart: always
    environment:
      NODE_ENV: production
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

  # ─────────────────────────────────────────────
  # Nginx Reverse Proxy + SSL
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cloudgrc_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
    networks:
      - public
    logging: *default-logging

  # ─────────────────────────────────────────────
  # Certbot (SSL Auto-Renewal)
  # ─────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: cloudgrc_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_conf:

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge
