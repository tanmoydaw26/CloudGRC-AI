version: "3.9"

services:

  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: cloudgrc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cloudgrc
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cloudgrc_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudgrc"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: cloudgrc_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudgrc_backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./scan_engine:/app/scan_engine
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ──
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudgrc_celery
    restart: unless-stopped
    env_file: ./backend/.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - ./scan_engine:/app/scan_engine
    command: celery -A backend.workers.celery_app worker --loglevel=info -Q scans,emails --concurrency=4

  # ── Celery Flower (Task Monitor) ──
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudgrc_flower
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A backend.workers.celery_app flower --port=5555

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: cloudgrc_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend

volumes:
  postgres_data:
